<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChoiGPT B2B Marketing Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* [DESIGN SYSTEM] */
        :root {
            --primary: #00f2ff;
            --secondary: #bc00ff;
            --bg-dark: #0a0b10;
            --card-bg: rgba(20, 22, 30, 0.9);
            --glass-border: rgba(0, 242, 255, 0.2);
            --text-main: #ffffff;
            --text-dim: #bbbbbb;
            --gradient: linear-gradient(135deg, #00f2ff, #bc00ff);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', 'Noto Sans KR', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; overflow-x: hidden; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .gradient-text { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* [NAVBAR] */
        nav { background: rgba(10, 11, 16, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border); padding: 1.2rem 0; position: sticky; top: 0; z-index: 1000; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.5rem; font-weight: 800; color: white; }
        .logo span { color: var(--primary); font-weight: 400; font-size: 1rem; margin-left: 0.5rem; }
        .nav-links a { text-decoration: none; color: var(--text-dim); margin-left: 2rem; font-weight: 500; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }

        /* [DASHBOARD] */
        section { padding: 4rem 0; }
        .section-desc { color: var(--text-dim); margin-bottom: 2rem; }
        .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
        
        .glass-card { 
            background: var(--card-bg); 
            border: 1px solid var(--glass-border); 
            border-radius: 24px; 
            padding: 2.5rem; 
            backdrop-filter: blur(15px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* [FORM STYLES] - NUCLEAR FIX */
        .admin-form { display: flex; flex-direction: column; gap: 1.5rem; width: 100%; }
        .form-group { display: flex; flex-direction: column; gap: 0.8rem; width: 100%; }
        .form-row { display: flex; gap: 1.5rem; width: 100%; }
        
        .form-group label { color: var(--primary); font-weight: 700; font-size: 0.95rem; }
        
        input, textarea, select {
            background: #000000 !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 12px !important;
            padding: 1.2rem !important;
            color: #ffffff !important;
            font-size: 1rem !important;
            width: 100% !important;
            transition: 0.3s;
            outline: none;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--primary) !important;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }

        .btn-primary {
            background: var(--gradient);
            color: white;
            border: none;
            padding: 1.2rem;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.4s;
            margin-top: 1rem;
            box-shadow: 0 10px 20px rgba(0, 242, 255, 0.2);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 242, 255, 0.4); }

        /* [MODAL] */
        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); }
        .modal-content { position: relative; margin: 5% auto; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; }
        .close-modal { position: absolute; right: 2rem; top: 2rem; font-size: 2rem; color: var(--text-dim); cursor: pointer; }

        /* Responsive */
        @media (max-width: 768px) {
            .form-row { flex-direction: column; }
            .hero-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-container">
            <div class="logo">ChoiGPT <span>B2B Admin</span></div>
            <div class="nav-links">
                <a href="#dashboard">대시보드</a>
                <a href="#add-client">고객 등록</a>
                <a href="https://alexchoi21.github.io/ChoiGPT_Service/">메인으로</a>
            </div>
        </div>
    </nav>

    <main class="container">
        <section id="dashboard">
            <h2 class="gradient-text" style="font-size: 2.5rem; margin-bottom: 0.5rem;">고객 관리 대시보드</h2>
            <p class="section-desc">현재 자동화 마케팅이 진행 중인 고객사 리스트입니다.</p>
            
            <div id="client-list" class="client-grid">
                <div style="text-align: center; padding: 4rem; color: var(--primary);">데이터를 불러오는 중...</div>
            </div>
        </section>

        <section id="add-client">
            <div class="glass-card">
                <h2 class="gradient-text" style="font-size: 2rem; margin-bottom: 1rem;">신규 고객 등록</h2>
                <p style="color: var(--text-dim); margin-bottom: 2.5rem;">업체 정보 및 마케팅 계정을 입력해주세요. 모든 정보는 암호화되어 안전하게 보관됩니다.</p>
                
                <form id="client-form" class="admin-form">
                    <div class="form-group">
                        <label>상호명</label>
                        <input type="text" id="business_name" placeholder="예: 맛있는 카페 대전점" required>
                    </div>
                    <div class="form-group">
                        <label>업체 기본 정보 (위치, 주요 타겟 등)</label>
                        <textarea id="business_info" placeholder="예: 대전 둔산동 위치, 2030 여성 타겟, 수제 디저트 전문" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>인스타그램 아이디</label>
                            <input type="text" id="ig_username" placeholder="Instagram ID" required>
                        </div>
                        <div class="form-group">
                            <label>인스타그램 비밀번호</label>
                            <input type="password" id="ig_password" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>적용 마케팅 방법론</label>
                        <select id="marketing_methodology">
                            <option value="STP">STP 전략 (시장 세분화, 타겟팅, 포지셔닝)</option>
                            <option value="AIDA">AIDA 모델 (주의, 관심, 욕구, 행동)</option>
                            <option value="SWOT">SWOT 분석 기반 전략</option>
                            <option value="4P">4P 믹스 (제품, 가격, 유통, 촉진)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">고객 등록 및 상권 분석 시작</button>
                </form>
            </div>
        </section>
    </main>

    <div id="report-modal" class="modal">
        <div class="modal-content glass-card">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title" class="gradient-text">상권 분석 리포트</h2>
            <div id="report-content" style="margin-top: 2rem;"></div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
